<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinkCoin | Boutique Parisienne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --rose: #D4A5A5; --gold: #C5A059; --champagne: #F7E7CE; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fffafb; overflow-x: hidden; }
        .font-paris { font-family: 'Playfair Display', serif; }

        /* Hanger Physics */
        .hanger-link {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: top center;
            opacity: 0;
            transform: translateY(-20px) rotate(-5deg);
            pointer-events: none;
        }

        .category-group:hover .hanger-link {
            opacity: 1;
            transform: translateY(0) rotate(0deg);
            pointer-events: auto;
        }

        @keyframes swing {
            0% { transform: rotate(3deg); }
            50% { transform: rotate(-3deg); }
            100% { transform: rotate(3deg); }
        }

        .category-group:hover .hanger-icon {
            animation: swing 2s ease-in-out infinite;
        }

        .gold-text {
            background: linear-gradient(to right, #C5A059, #F7E7CE, #C5A059);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <!-- Upper Nav -->
    <nav class="bg-white border-b border-rose-100 py-4 px-8 flex justify-between items-center sticky top-0 z-50">
        <div class="flex space-x-6 text-[10px] font-bold tracking-widest uppercase">
            <button onclick="setLang('fr')" class="hover:text-rose-400">FR</button>
            <button onclick="setLang('en')" class="hover:text-rose-400">EN</button>
            <button onclick="setLang('ar')" class="hover:text-rose-400">AR</button>
        </div>
        
        <div class="text-4xl font-paris font-bold gold-text tracking-tighter">PinkCoin</div>

        <div class="flex space-x-6">
            <i data-lucide="search" class="w-5 h-5 cursor-pointer"></i>
            <div class="relative cursor-pointer">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-rose-400 text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full">0</span>
            </div>
        </div>
    </nav>

    <!-- Hanger Closet Navigation -->
    <div class="bg-white/80 backdrop-blur-md border-b border-rose-50 py-2 relative">
        <div class="container mx-auto flex justify-center space-x-16">
            
            <!-- Category: Femme -->
            <div class="category-group relative py-4">
                <button class="uppercase text-xs tracking-[0.3em] font-semibold text-gray-600 hover:text-rose-400" data-i18n="femme">Femme</button>
                <div class="absolute top-full left-1/2 -translate-x-1/2 flex space-x-4 pt-4">
                    <a href="#" class="hanger-link text-center group">
                        <div class="hanger-icon">
                            <svg class="w-12 h-12 mx-auto text-gold" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2v4m0 0a4 4 0 0 1 4 4v10H8V10a4 4 0 0 1 4-4z"/></svg>
                            <img src="https://cdn-icons-png.flaticon.com/512/3534/3534312.png" class="w-10 h-10 mx-auto opacity-60 group-hover:opacity-100 transition-opacity" alt="Dress">
                        </div>
                        <span class="text-[9px] uppercase tracking-tighter mt-2 block" data-i18n="dresses">Robes</span>
                    </a>
                    <a href="#" class="hanger-link text-center group" style="transition-delay: 0.1s;">
                        <div class="hanger-icon">
                            <svg class="w-12 h-12 mx-auto text-gold" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2v4m0 0a4 4 0 0 1 4 4v10H8V10a4 4 0 0 1 4-4z"/></svg>
                            <img src="https://cdn-icons-png.flaticon.com/512/1785/1785311.png" class="w-10 h-10 mx-auto opacity-60 group-hover:opacity-100 transition-opacity" alt="Skirt">
                        </div>
                        <span class="text-[9px] uppercase tracking-tighter mt-2 block" data-i18n="skirts">Jupes</span>
                    </a>
                </div>
            </div>

            <!-- Category: Homme -->
            <div class="category-group relative py-4">
                <button class="uppercase text-xs tracking-[0.3em] font-semibold text-gray-600 hover:text-rose-400" data-i18n="homme">Homme</button>
                <div class="absolute top-full left-1/2 -translate-x-1/2 flex space-x-4 pt-4">
                    <a href="#" class="hanger-link text-center group">
                        <div class="hanger-icon">
                            <svg class="w-12 h-12 mx-auto text-gold" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2v4m0 0a4 4 0 0 1 4 4v10H8V10a4 4 0 0 1 4-4z"/></svg>
                            <img src="https://cdn-icons-png.flaticon.com/512/3531/3531821.png" class="w-10 h-10 mx-auto opacity-60 group-hover:opacity-100 transition-opacity" alt="Blazer">
                        </div>
                        <span class="text-[9px] uppercase tracking-tighter mt-2 block" data-i18n="blazers">Blazers</span>
                    </a>
                    <a href="#" class="hanger-link text-center group" style="transition-delay: 0.1s;">
                        <div class="hanger-icon">
                            <svg class="w-12 h-12 mx-auto text-gold" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2v4m0 0a4 4 0 0 1 4 4v10H8V10a4 4 0 0 1 4-4z"/></svg>
                            <img src="https://cdn-icons-png.flaticon.com/512/2503/2503380.png" class="w-10 h-10 mx-auto opacity-60 group-hover:opacity-100 transition-opacity" alt="Trouser">
                        </div>
                        <span class="text-[9px] uppercase tracking-tighter mt-2 block" data-i18n="trousers">Pantalons</span>
                    </a>
                </div>
            </div>

        </div>
    </div>

    <!-- Hero Section -->
    <header class="h-[80vh] flex items-center justify-center text-center px-6">
        <div class="max-w-3xl space-y-8">
            <h1 class="text-7xl font-paris italic gold-text" data-i18n="hero-title">L'Élégance Pure</h1>
            <p class="text-gray-500 tracking-widest text-sm leading-relaxed" data-i18n="hero-sub">Directement de Paris à votre dressing à Alger.</p>
            <button class="px-12 py-4 bg-gray-900 text-white text-[10px] tracking-[0.3em] uppercase hover:bg-gold transition-colors duration-500 shadow-2xl">
                Explore Now
            </button>
        </div>
    </header>

    <script src="app.js"></script>
</body>
</html>
