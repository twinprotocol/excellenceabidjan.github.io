<!DOCTYPE html>
<html lang="fr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINKOIN | Official Store</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

                    <div class="mega-dropdown">
                        <div class="hanger-container">

                                    <a href="#">Chemises</a>
                                    <a href="#">Costumes</a>
                                    <a href="#">Pantalons</a>

                                    <a href="#">Manteaux</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </li>
                <li class="nav-item" data-category="femme">
                    <a href="#">FEMME</a>
                    <div class="mega-dropdown">
                        <div class="hanger-container">
                            <div class="hanger-metal"></div>
                            <div class="garment dress">
                                <div class="menu-content">
                                    <a href="#">Robes</a>
                                    <a href="#">Jupes</a>
                                    <a href="#">Chemisiers</a>

                        <div class="hanger-container">
                            <div class="hanger-metal"></div>
                            <div class="garment kids">
                                <div class="menu-content">
                                    <a href="#">Bébé</a>
                                    <a href="#">Garçon</a>
                                    <a href="#">Fille</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </li>
                <li class="nav-item"><a href="#">ACCESSOIRES</a></li>
            </ul>
        </nav>
        <div class="nav-icons">
            <span>🔍</span>
            <span>👤</span>
            <span>👜 (0)</span>
        </div>

    <section class="hero">
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=1500" alt="Fashion Photography">
        </div>
        <div class="hero-text">
            <h1>ESSENCE DE QUARTZ</h1>
            <p>Nouvelle Collection 2026</p>
            <button class="cta-btn">Explorer</button>
        </div>

    <script src="script.js"></script>
