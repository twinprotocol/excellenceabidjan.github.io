<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AtlasStock — Multilingual Stock Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1 id="app-title">AtlasStock</h1>
      <div class="selectors">
        <select id="language-selector">
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="ar">العربية</option>
        </select>
        <select id="currency-selector"></select>
      </div>
    </header>
    <main>
      <section class="table-section">
        <h2 id="title-products"></h2>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
          <input id="q" placeholder="Search..." style="flex:1;padding:8px;border-radius:6px;border:1px solid #222;background:#0f1724;color:inherit;">
          <button id="addBtn" class="btn">+ <span data-i18n="add">Add</span></button>
          <button id="importBtn" class="btn ghost" data-i18n="import">Import CSV</button>
          <button id="exportBtn" class="btn" data-i18n="export">Export CSV</button>
          <button id="undoBtn" class="btn ghost">Undo</button>
          <button id="redoBtn" class="btn ghost">Redo</button>
          <button id="clearBtn" class="btn danger" data-i18n="clear">Clear DB</button>
        </div>
        <table style="margin-top:12px;">
          <thead>
            <tr>
              <th>#</th>
              <th data-i18n="name">Name</th>
              <th data-i18n="sku">SKU</th>
              <th data-i18n="category">Category</th>
              <th data-i18n="qty">Qty</th>
              <th data-i18n="price">Price</th>
              <th data-i18n="updated">Updated</th>
              <th data-i18n="actions">Actions</th>
            </tr>
          </thead>
          <tbody id="product-list"></tbody>
        </table>

        <div style="display:flex;gap:12px;margin-top:12px;align-items:center;">
          <div><strong data-i18n="total">Total items</strong>: <span id="totalCount">0</span></div>
          <div><strong data-i18n="low">Low stock</strong>: <span id="lowCount">0</span></div>
          <div><strong data-i18n="stockValue">Stock Value</strong>: <span id="stockValue">0</span></div>
          <div><strong data-i18n="skuCount">Unique SKUs</strong>: <span id="skuCount">0</span></div>
        </div>

        <div style="margin-top:12px;background:#0b1020;padding:10px;border-radius:8px;">
          <div class="muted" data-i18n="activity">Activity log</div>
          <div id="activity" style="max-height:180px;overflow:auto;margin-top:8px;"></div>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
