<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Messenger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Mini Messenger</h1>
      <div class="top-controls">
        <input id="myId" placeholder="your id (e.g. alice)" />
        <input id="peerId" placeholder="peer id (e.g. bob) - leave blank to broadcast" />
        <button id="connectBtn">Connect</button>
      </div>
    </header>

    <main>
      <aside class="sidebar">
        <h3>Online</h3>
        <ul id="onlineList"></ul>
      </aside>

      <section class="chat">
        <div id="messages" class="messages"></div>

        <div class="composer">
          <input id="textInput" placeholder="Type a message..." />
          <input id="fileInput" type="file" accept="image/*" />
          <button id="sendBtn">Send</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
