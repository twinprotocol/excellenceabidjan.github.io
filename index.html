<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AtlasStock Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1 id="app-title">AtlasStock Pro</h1>
  <div class="controls">
    <select id="language-selector">
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="ar">العربية</option>
    </select>
    <select id="currency-selector"></select>
    <button id="theme-toggle">Dark/Light</button>
  </div>
</header>

<main>
  <section id="dashboard">
    <div class="card">Total Products: <span id="total-products">0</span></div>
    <div class="card">Total Stock Value: <span id="total-value">0</span></div>
    <div class="card">Total Profit: <span id="total-profit">0</span></div>
  </section>

  <section id="inventory">
    <h2>Products</h2>
    <div id="product-cards"></div>
    <button id="add-product-btn">Add Product</button>
  </section>

  <section id="clients">
    <h2>Clients</h2>
    <div id="client-cards"></div>
    <button id="add-client-btn">Add Client</button>
  </section>

  <section id="sales">
    <h2>Invoices</h2>
    <div id="invoice-list"></div>
    <button id="export-csv">Export CSV</button>
  </section>
</main>

<!-- Modals for forms & confirmations -->
<div id="modal-overlay" class="hidden">
  <div id="modal-content"></div>
</div>

<script src="app.js"></script>
</body>
</html>
