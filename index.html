<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Store POS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="header-left">
    <h2>Music Store POS</h2>
  </div>

  <div class="header-right">
    <input id="search" placeholder="Search...">

    <select id="lang" onchange="setLang(this.value)">
      <option value="en">EN</option>
      <option value="fr">FR</option>
      <option value="ar">AR</option>
    </select>

    <button onclick="openCart()">Cart (<span id="cartCount">0</span>)</button>
  </div>
</header>

<main id="productList"></main>

<section class="panel">
  <h3 id="panelTitle">Add Product</h3>

  <input id="name" placeholder="Product name">
  <input id="buy" type="number" placeholder="Buy price">
  <input id="sell" type="number" placeholder="Sell price">
  <input id="stock" type="number" placeholder="Stock">
  <input id="image" placeholder="Image URL">

  <button onclick="addProduct()">Add</button>
</section>

<section class="dashboard">
  <h3>Dashboard</h3>
  <p id="sales"></p>
  <p id="revenue"></p>
  <p id="profit"></p>
</section>

<!-- CART -->
<div id="cartModal" class="modal hidden">
  <h3>Cart</h3>
  <ul id="cartItems"></ul>
  <h4 id="total"></h4>
  <button onclick="checkout()">Checkout</button>
  <button onclick="closeCart()">Close</button>
</div>

<!-- INVOICE -->
<div id="invoiceModal" class="modal hidden">
  <h3>Invoice</h3>
  <p id="invoiceInfo"></p>
  <table>
    <tbody id="invoiceBody"></tbody>
  </table>
  <h4 id="invoiceTotal"></h4>
  <button onclick="window.print()">Print</button>
</div>

<script src="app.js"></script>
</body>
</html>
