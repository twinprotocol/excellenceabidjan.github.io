<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twin Protocol – Gestion Stock v2</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <h2>📦 Twin Stock</h2>
      </div>
      <nav>
        <button class="tab-btn active" data-tab="produits">Produits</button>
        <button class="tab-btn" data-tab="ventes">Stock & Ventes</button>
        <button class="tab-btn" data-tab="export">Export / Partage</button>
      </nav>
      <div class="bottom-options">
        <button id="langToggle">🌐 FR / AR</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="content">
      <header>
        <h1 id="page-title">Produits</h1>
        <div class="actions">
          <button class="add-btn" id="addProductBtn">+ Ajouter</button>
        </div>
      </header>

      <!-- Dashboard -->
      <section id="dashboard" class="card">
        <div class="stats">
          <div class="stat">
            <h3>Total Produits</h3>
            <p id="totalProduits">0</p>
          </div>
          <div class="stat">
            <h3>Ventes Aujourd'hui</h3>
            <p id="ventesAujourdhui">0</p>
          </div>
          <div class="stat">
            <h3>Chiffre d’Affaires</h3>
            <p id="caTotal">0 FCFA</p>
          </div>
        </div>
        <canvas id="chartVentes" height="100"></canvas>
      </section>

      <!-- Tab content -->
      <section id="produits" class="tab-content active">
        <div class="card">
          <h2>Liste des produits</h2>
          <input type="text" id="searchProduit" placeholder="Rechercher un produit...">
          <table id="produitsTable">
            <thead>
              <tr><th>Image</th><th>Nom</th><th>Prix</th><th>Stock</th><th>Actions</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section id="ventes" class="tab-content">
        <div class="card">
          <h2>Vendre un produit</h2>
          <div id="venteForm">
            <input type="text" id="venteNom" placeholder="Nom du produit">
            <input type="number" id="venteQuantite" placeholder="Quantité">
            <button id="enregistrerVenteBtn">Enregistrer</button>
          </div>
        </div>
      </section>

      <section id="export" class="tab-content">
        <div class="card">
          <h2>Export / Partage</h2>
          <button id="exportExcelBtn">📤 Export Excel</button>
          <button id="exportCSVBtn">📄 Export CSV</button>
          <button id="whatsappShareBtn">📱 Partager sur WhatsApp</button>
          <button id="exportAllBtn">💾 Exporter toutes les données (JSON)</button>
          <input type="file" id="importAllInput" accept=".json">
        </div>
      </section>
    </main>
  </div>
</body>
</html>
