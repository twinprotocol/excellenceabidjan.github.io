<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YamahaBidjan Stock Manager</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <div class="brand-mark">YB</div>
            <div>
                <h1>YamahaBidjan</h1>
                <p>Stock Manager • Abidjan</p>
            </div>
        </div>

        <div class="lang-switch">
            <button id="lang-en" onclick="switchLanguage('en')">EN</button>
            <button id="lang-fr" onclick="switchLanguage('fr')">FR</button>
            <button id="lang-ar" onclick="switchLanguage('ar')">AR</button>
        </div>
    </header>

    <div class="layout">
        <aside id="sidebar" class="sidebar"></aside>
        <main id="main" class="main">
            <div class="loading">Loading YamahaBidjan...</div>
        </main>
    </div>

    <nav id="mobile-nav" class="mobile-nav"></nav>

    <div id="modal" class="modal hidden"></div>
    <div id="cart-drawer" class="drawer hidden"></div>
    <div id="toast" class="toast hidden"></div>

    <noscript>
        <div class="noscript">Please enable JavaScript to use YamahaBidjan.</div>
    </noscript>
</body>
</html>
