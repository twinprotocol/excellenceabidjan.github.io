<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Store POS</title>

<link rel="stylesheet" href="style.css">

<!-- PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>
  <h2>Music Store</h2>

  <div class="controls">
    <input id="search" placeholder="Search...">
    <button id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
  </div>
</header>

<main id="products"></main>

<section class="panel">
  <h3>Add Product</h3>

  <input id="name" placeholder="Name">
  <input id="buy" type="number" placeholder="Buy price">
  <input id="sell" type="number" placeholder="Sell price">
  <input id="stock" type="number" placeholder="Stock">
  <input id="image" placeholder="Image URL">

  <button onclick="addProduct()">Add</button>
</section>

<section class="dashboard">
  <h3>Dashboard</h3>
  <p id="sales"></p>
  <p id="revenue"></p>
  <p id="profit"></p>
</section>

<section class="history">
  <h3>Invoice History</h3>
  <ul id="historyList"></ul>
</section>

<!-- CART -->
<div id="cartModal" class="modal hidden">
  <h3>Cart</h3>
  <ul id="cartItems"></ul>
  <h4 id="cartTotal"></h4>
  <button onclick="checkout()">Checkout</button>
  <button onclick="closeCart()">Close</button>
</div>

<!-- INVOICE -->
<div id="invoiceModal" class="modal hidden">
  <h3>Invoice</h3>
  <p id="invoiceInfo"></p>

  <table>
    <tbody id="invoiceTable"></tbody>
  </table>

  <h4 id="invoiceTotal"></h4>

  <button onclick="downloadPDF()">Download PDF</button>
  <button onclick="window.print()">Print</button>
</div>

<script src="app.js"></script>
</body>
</html>
