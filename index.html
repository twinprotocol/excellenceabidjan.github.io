<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPTV World — Twin Protocol</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🌍 IPTV World</h1>
    <select id="contentMode">
      <option value="safe" selected>Safe</option>
      <option value="nsfw">NSFW</option>
      <option value="both">Both</option>
    </select>
    <input id="search" type="text" placeholder="Search channel..." />
    <select id="countrySelect"></select>
  </header>

  <main>
    <div id="status">Loading channels...</div>
    <div id="channelsGrid"></div>
  </main>

  <footer>
    <p>Powered by <b>Twin Protocol</b> • IPTV-org API</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="app.js"></script>
</body>
</html>
