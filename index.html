<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IPTV World — Netflix+</title>
  <link rel="stylesheet" href="style.css" />
  <!-- hls.js for HLS fallback -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
  <script src="script.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">IPTV<span>World+</span></div>
      <div class="sub">Live channels • Premium UI</div>
    </div>

    <div class="controls">
      <input id="search" placeholder="Search channels (current view)..." />
      <button id="backBtn" class="btn hidden">← Categories</button>
      <button id="refreshBtn" class="btn">⟳ Refresh</button>
    </div>
  </header>

  <main id="main" class="main">
    <section id="categories" class="categories" aria-label="Categories"></section>

    <section id="channelsSection" class="channelsSection hidden" aria-label="Channels">
      <div class="channelsHeader">
        <h2 id="channelsTitle">Channels</h2>
        <div id="channelsStatus" class="muted small">—</div>
      </div>
      <div id="channels" class="channelsGrid" role="list"></div>
    </section>
  </main>

  <div id="playerModal" class="playerModal hidden" role="dialog" aria-modal="true">
    <div class="playerCard">
      <button id="closePlayer" class="closeBtn">✕</button>
      <div id="nowPlaying" class="nowPlaying">—</div>
      <div class="videoWrap"><video id="video" playsinline controls></video></div>
      <div id="playerNotice" class="muted small"></div>
    </div>
  </div>

  <footer class="footer">© Twin Protocol — Netflix+ IPTV</footer>
</body>
</html>
