<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINKOIN | Maison de Haute Couture</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@200;400;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-prestige">
        <div id="ship-text">Livraison Prestige 58 Wilayas</div>
        <div class="lang-selector">
            <span onclick="setLanguage('ar')">AR</span>
            <span onclick="setLanguage('en')">EN</span>
            <span onclick="setLanguage('fr')" class="active">FR</span>
        </div>
    </div>

    <header class="header-main">
        <div class="logo-container" onclick="renderHome()">
            <h1 class="brand-identity">PINKOIN</h1>
        </div>
        
        <nav class="nav-centered">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="selectCategory(this, 'femme')">FEMME</a>
                    <div class="hanger-dropdown">
                        <div class="hanger-swing">
                            <div class="hanger-hook"></div>
                            <div class="garment-shape">
                                <div class="menu-content">
                                    <a href="#" onclick="renderCategory('femme')">Robes</a>
                                    <a href="#" onclick="renderCategory('femme')">Luxe</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="selectCategory(this, 'homme')">HOMME</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="selectCategory(this, 'enfant')">ENFANT</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="selectCategory(this, 'accessoires')">ACCESSOIRES</a></li>
            </ul>
        </nav>

        <div class="cart-wrapper" onclick="toggleCart()">
            <div class="cart-icon">
                <i class="fa-solid fa-bag-shopping"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <div id="sparkle-container"></div>

    <main id="dynamic-render"></main>

    <script src="script.js"></script>
</body>
</html>
