<!DOCTYPE html>
<html lang="fr" id="site-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinkCoin | Luxury Store</title>
    <!-- Polices & Icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body id="main-body">

    <!-- Barre de Langues et Promo -->
    <div class="top-bar">
        <div id="ship-info">Livraison gratuite sur 58 Wilayas</div>
        <div class="lang-selector">
            <span onclick="updateLang('fr')">FR</span>
            <span onclick="updateLang('en')">EN</span>
            <span onclick="updateLang('ar')">العربية</span>
        </div>
    </div>

    <header>
        <a href="#" class="brand-logo">
            <img src="Elegant 'PINK COIN' Logo with Quartz Element.jpg" alt="Logo Quartz" class="logo-img"> <!--[cite: 1] -->
            <span class="pinkcoin-text">PinkCoin</span> <!-- Toujours en Anglais[cite: 1] -->
        </a>
        
        <nav>
            <ul class="nav-links">
                <li class="nav-item">
                    <a href="#" id="nav-f">Femme</a>
                    <div class="hanger-dropdown">
                        <!-- SVG du Cintre Doré[cite: 1] -->
                        <svg class="hanger-svg" viewBox="0 0 100 50">
                            <path d="M50 10C55 5 65 5 65 10C65 15 55 18 50 22M10 45C10 35 30 30 50 30C70 30 90 35 90 45" stroke="#D4AF37" fill="none" stroke-width="2"/>
                        </svg>
                        <div class="garment-container">
                            <a href="#" id="sub-robes">Robes</a>
                            <a href="#" id="sub-jupes">Jupes</a>
                        </div>
                    </div>
                </li>
                <li class="nav-item"><a href="#" id="nav-h">Homme</a></li>
                <li class="nav-item"><a href="#" id="nav-b">Beauté</a></li>
                <li onclick="toggleAdmin()"><i class="fa fa-cog"></i></li>
            </ul>
        </nav>
    </header>

    <!-- Zone d'Administration (Upload d'articles)[cite: 1] -->
    <section id="admin-panel">
        <h3>Ajouter un Article</h3>
        <div class="admin-grid">
            <input type="text" id="p-name" placeholder="Nom de l'article">
            <input type="number" id="p-price" placeholder="Prix (DZD)">
            <input type="text" id="p-img" placeholder="Lien de l'image">
            <button class="btn-post" onclick="addNewItem()">PUBLIER</button>
        </div>
    </section>

    <!-- Grille de Produits Dynamique -->
    <main class="product-grid" id="shop-container"></main>

    <script src="script.js"></script>
</body>
</html>
