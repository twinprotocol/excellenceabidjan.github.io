<!DOCTYPE html>
<html lang="fr" id="pinkoin-app">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINKOIN | Maison de Haute Couture</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@200;300;400;600&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="luxury-theme">

    <header class="main-header">
        <div class="top-nav">
            <div class="ship-banner t-ship">Livraison Prestige 58 Wilayas</div>
            <div class="lang-controls">
                <button onclick="switchLang('ar')">AR</button>
                <button onclick="switchLang('en')">EN</button>
                <button onclick="switchLang('fr')" class="active">FR</button>
            </div>
        </div>

        <nav class="navbar">
            <div class="logo">PINKOIN</div>
            <ul class="nav-menu">
                <li class="nav-item" onmouseenter="playHanger('femme')">
                    <a href="#" class="t-femme">FEMME</a>
                    <div class="mega-dropdown" id="dropdown-femme">
                        <div class="hanger-system">
                            <div class="hanger-hook"></div>
                            <div class="robe-garment">
                                <div class="subcategory-list">
                                    <a href="#" style="--i:1">Robes</a>
                                    <a href="#" style="--i:2">Jupes</a>
                                    <a href="#" style="--i:3">Chemisiers</a>
                                    <a href="#" style="--i:4">Pantalons</a>
                                    <a href="#" style="--i:5">Vestes</a>
                                    <a href="#" style="--i:6">Soirée</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </li>
                <li class="nav-item" onmouseenter="playHanger('homme')">
                    <a href="#" class="t-homme">HOMME</a>
                    <div class="mega-dropdown" id="dropdown-homme">
                        <div class="hanger-system">
                            <div class="hanger-hook"></div>
                            <div class="shirt-garment">
                                <div class="subcategory-list">
                                    <a href="#" style="--i:1">Costumes</a>
                                    <a href="#" style="--i:2">Chemises</a>
                                    <a href="#" style="--i:3">Pantalons</a>
                                    <a href="#" style="--i:4">Vestes</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </li>
                <li class="nav-item"><a href="#" class="t-enfant">ENFANT</a></li>
                <li class="nav-item"><a href="#" class="t-access">ACCESSOIRES</a></li>
            </ul>
        </header>

    <section class="hero">
        <div class="hero-visual">
            <h1 class="reveal-text">L'ÉLÉGANCE AU QUARTZ</h1>
            <p class="t-hero-sub">Collection Signature 2026</p>
            <button class="btn-primary t-explore">EXPLORER</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
