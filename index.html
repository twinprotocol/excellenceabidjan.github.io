<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Store POS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h2 id="title">Music Store POS</h2>

  <div class="controls">
    <input id="search" placeholder="Search products...">

    <select id="language">
      <option value="en">EN</option>
      <option value="fr">FR</option>
      <option value="ar">AR</option>
    </select>

    <button id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
  </div>
</header>

<main id="productContainer"></main>

<section class="panel">
  <h3 id="panelTitle">Add Product</h3>

  <input id="pName" placeholder="Name">
  <input id="pBuy" type="number" placeholder="Buy Price">
  <input id="pSell" type="number" placeholder="Sell Price">
  <input id="pStock" type="number" placeholder="Stock">
  <input id="pImage" placeholder="Image URL">

  <button id="addBtn">Add</button>
</section>

<section class="dashboard">
  <h3>Dashboard</h3>
  <p id="sales"></p>
  <p id="revenue"></p>
  <p id="profit"></p>
</section>

<!-- CART -->
<div id="cartModal" class="modal hidden">
  <h3>Cart</h3>
  <ul id="cartList"></ul>
  <h4 id="cartTotal"></h4>
  <button id="checkoutBtn">Checkout</button>
  <button id="closeCartBtn">Close</button>
</div>

<!-- INVOICE -->
<div id="invoiceModal" class="modal hidden">
  <h3>Invoice</h3>
  <p id="invoiceHeader"></p>
  <table>
    <tbody id="invoiceTable"></tbody>
  </table>
  <h4 id="invoiceTotal"></h4>
  <button onclick="window.print()">Print</button>
</div>

<script src="app.js"></script>
</body>
</html>
