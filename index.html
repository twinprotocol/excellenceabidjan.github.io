<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World IPTV – Twin Protocol</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <header>
    <h1>🌐 World IPTV</h1>
    <p>Watch worldwide channels by country — no links, just play.</p>
  </header>

  <div class="controls">
    <input id="search" placeholder="🔎 Search channel or country...">
    <select id="contentMode">
      <option value="safe">🌍 Safe</option>
      <option value="nsfw">🔞 NSFW</option>
      <option value="both" selected>🌐 Both</option>
    </select>
    <select id="countrySelect">
      <option value="">All Countries</option>
    </select>
  </div>

  <main>
    <aside id="countryList"></aside>
    <section class="channels">
      <h2 id="sectionTitle">All Channels</h2>
      <div id="channelsGrid" class="grid"></div>
    </section>
  </main>

  <footer>
    <p>Created by <b>Twin Protocol</b> — powered by <a href="https://iptv-org.github.io/" target="_blank">IPTV-org</a></p>
  </footer>

  <div id="playerModal" class="modal hidden">
    <div class="player">
      <button id="closePlayer">✖</button>
      <h3 id="nowPlaying">Loading...</h3>
      <video id="video" controls autoplay></video>
    </div>
  </div>
</body>
</html>
