<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV World v3</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
<script src="app.js" defer></script>
</head>
<body>

<header class="navbar">
  <h1 class="logo">IPTV<span>World</span></h1>
  <div class="controls">
    <input type="text" id="search" placeholder="Search channels...">
  </div>
</header>

<main id="categories" class="categories"></main>
<div id="channels" class="channels hidden"></div>

<div id="playerModal" class="playerModal hidden">
  <div class="playerCard">
    <button id="closeBtn" class="closeBtn">✕</button>
    <div id="nowPlaying" class="nowPlaying"></div>
    <div class="videoWrap"><video id="video" controls playsinline></video></div>
    <div id="playerNotice" class="playerNotice"></div>
  </div>
</div>

<footer>© IPTV World v3 — Safe Channels</footer>
</body>
</html>
