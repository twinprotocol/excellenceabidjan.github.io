<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YamahaBidjan • Stock Manager</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <header class="app-header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-icon">🎹</div>
                <div>
                    <h1>YamahaBidjan</h1>
                    <p>Music Stock • Abidjan</p>
                </div>
            </div>

            <div class="language-switcher">
                <button onclick="switchLanguage('en')" id="lang-en" class="lang-btn">EN</button>
                <button onclick="switchLanguage('fr')" id="lang-fr" class="lang-btn">FR</button>
                <button onclick="switchLanguage('ar')" id="lang-ar" class="lang-btn">AR</button>
            </div>

            <div class="store-badge">
                <i class="fas fa-store"></i>
                <span>Yamaha Abidjan</span>
            </div>
        </div>
    </header>

    <div class="app-shell">
        <aside id="sidebar" class="sidebar"></aside>

        <main id="main-content" class="main-content"></main>
    </div>

    <nav id="mobile-nav" class="mobile-nav"></nav>

    <div id="add-modal" class="hidden modal-backdrop"></div>

    <div id="cart-panel" class="hidden cart-backdrop"></div>

    <div id="toast" onclick="this.classList.add('hidden')" class="hidden toast"></div>

    <script src="script.js"></script>
</body>
</html>
