<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINKOIN | Maison de Haute Couture</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@200;400;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body id="main-body">

    <div class="top-prestige">
        <div id="ship-text">Livraison Prestige 58 Wilayas</div>
        <div class="lang-selector">
            <span onclick="setLanguage('ar')">AR</span>
            <span onclick="setLanguage('en')">EN</span>
            <span onclick="setLanguage('fr')" class="active">FR</span>
        </div>
    </div>

    <header class="navbar-premium">
        <div class="logo-wrap" onclick="renderHome()">
            <a href="#" class="brand-identity">PINKOIN</a>
        </div>
        
        <nav class="desktop-nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="renderCategory('femme')">FEMME</a>
                    <div class="hanger-dropdown">
                        <div class="hanger-swing">
                            <div class="hanger-hook"></div>
                            <div class="garment-shape">
                                <div class="menu-content">
                                    <a href="#" onclick="renderCategory('femme')">Robes de Soirée</a>
                                    <a href="#" onclick="renderCategory('femme')">Prêt-à-Porter</a>
                                    <a href="#" onclick="renderCategory('femme')">Denim</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="renderCategory('homme')">HOMME</a>
                    <div class="hanger-dropdown">
                        <div class="hanger-swing">
                            <div class="hanger-hook"></div>
                            <div class="garment-shape blazer">
                                <div class="menu-content">
                                    <a href="#" onclick="renderCategory('homme')">Blazers</a>
                                    <a href="#" onclick="renderCategory('homme')">Chemises</a>
                                    <a href="#" onclick="renderCategory('homme')">Costumes</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="renderCategory('beaute')">BEAUTÉ</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="renderCategory('accessoires')">ACCESSOIRES</a></li>
            </ul>
        </nav>
    </header>

    <main id="dynamic-render"></main>

    <script src="script.js"></script>
</body>
</html>
