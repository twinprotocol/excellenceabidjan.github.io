<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yamaha Shop Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🎹 Yamaha Shop</h1>

  <div class="top-bar">
    <input id="search" placeholder="Search products...">

    <select id="lang" onchange="setLanguage(this.value)">
      <option value="en">EN</option>
      <option value="fr">FR</option>
      <option value="ar">AR</option>
    </select>

    <button onclick="showCart()">🛒 <span id="cartCount">0</span></button>
  </div>
</header>

<main id="products"></main>

<section class="panel">
  <h2 id="panelTitle">Add Product</h2>

  <input id="name" placeholder="Name">
  <input id="buyPrice" type="number" placeholder="Buy Price">
  <input id="sellPrice" type="number" placeholder="Sell Price">
  <input id="stock" type="number" placeholder="Stock">
  <input id="image" placeholder="Image URL">

  <button onclick="addProduct()">Add</button>
  <button onclick="restockProduct()">Restock</button>
</section>

<section class="dashboard">
  <h2>📊 Dashboard</h2>
  <p id="salesToday"></p>
  <p id="revenueToday"></p>
  <p id="profitToday"></p>
</section>

<div id="cartModal" class="modal hidden">
  <h2>Cart</h2>
  <ul id="cartItems"></ul>
  <h3 id="cartTotal"></h3>
  <button onclick="checkout()">Checkout</button>
  <button onclick="closeCart()">Close</button>
</div>

<div id="invoice" class="modal hidden">
  <h2>Invoice</h2>
  <p id="invoiceInfo"></p>

  <table>
    <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody id="invoiceItems"></tbody>
  </table>

  <h3 id="totalPrice"></h3>
  <button onclick="window.print()">Print</button>
</div>

<script src="app.js"></script>
</body>
</html>
